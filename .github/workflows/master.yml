name: CI/CD scratch challenge

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true
        default: "v1"

env:
  DOCKER_IMAGE: brandza99/ci-cd-scratch-challenge
  IMAGE_TAG: ${{ github.event.inputs.image_tag }}

jobs:
  ci-cd-scratch:
    runs-on: ubuntu-latest
    environment: Master
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Project files
        run: ls -la

      - name: Print fake build message
        run: echo "Build ci-cd-scratch started"

      - name: Print fake deploy message
        run: echo "Deploy started"

      - name: Build Docker image
        run: docker build -t $DOCKER_IMAGE:$IMAGE_TAG -t $DOCKER_IMAGE:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image v1
        run: docker push $DOCKER_IMAGE:$IMAGE_TAG

      - name: Push Docker image latest
        run: docker push $DOCKER_IMAGE:latest

      - name: Write workflow summary
        run: |
          echo "## Docker CI/CD scratch challenge Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Docker image: $DOCKER_IMAGE" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- Latest tag: latest" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: $GITHUB_EVENT_NAME" >> $GITHUB_STEP_SUMMARY
